<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    
     <!--img etiketi normal etiketler gibi açılış ve kapanışa sahip değildir, sadece açılış etiketi
     üzerinden ilerlenir.Görselimizin siteye sağlıklı bir şekilde eklenmesi için sitemizin html dosyası
      yani projemiz ile eklenecek görsellerimiz aynı klasör içinde olmalıdır. görselin boyutunu ayarlarken
      width(genişlik) attribute'ini tek değiştirmeyi tercih ederiz,böylece yükseklik otomatik ayarlanmış olup
      görselin orjinalliğini bozmaz-->

      <!--src attribute'ü siteye kaynak/görsel/dosya eklememizi sağlar
          alt attribute'ü görsel gözükmüyorken orda neyin olduğunu tanımlamamızı sağlar
          width attribute'ü görselimizin genişliğini ayarlamayı sağlar.
          buna benzer birçok attribute vardır.-->

    

      <img src="kahve0.png" width="150">
      <img src="kahve1.png" width="150">
    
      <img src="abcabc.png" width="150" alt="Kahve Çekirdeği görseli"> <!--bu görsel gözükmeyecek ama alt 
      attribute'ü sayesinde burda ne olduğunu gösterebildik.-->

      <!--görselimiz olur da farklı klasörde bulunuyorsa (ki genelde böyle olursa doğru klasöre almalıyız)
      kaynak yolunu gösterirken bir üst klasöre geçebilmek için ".." iki nokta kullanırız.-->


      <!--internet üzerinden bir link ile de görsel eklenebilir.Yani İlla görseli bilgisayara indirmiş olmak 
       gerekmiyor.Ama link kullanırsan da linkini aldığın görselin daha sonra internetten silinmeyeceğine dikkat et
       aksi halde sitemizde de bu görsel gözükmez -->

       <img src="https://wp.oggusto.com/wp-content/uploads/2023/04/kahve-philips-5400-lattego.webp" width="200">

      







</body>
</html>
